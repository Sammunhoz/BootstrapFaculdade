<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
<style>
    div {
            padding: 10px;
            background-color: #2c2c2c ;
            overflow: hidden;
        }
    input[type=text], textarea, select {
            font: 17px Calibri;
            width: 70%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
    input[type=button]{ 
            font: 17px Calibri;
            width: auto;
            float: right;
            cursor: pointer;
            padding: 7px;
        }
</style>

</head>
<body>
   <div>
        <div>
            <input type="text" id="txtName" placeholder="Nome Clinte" />
        </div>
        <div>
            <input type="text" id="txtIdade" placeholder="Idade Cliente" />
        </div>
        <div>
            <input type="text" id="txtEmail" placeholder="Email" />
        </div>
        <div>
            <select id = "SelCountry">
                <option selected value="">"escolha seu país"</option>
                <option value = "India">India</option>
                <option value = "Brasil">Brasil</option>
            </select>
        </div>
        <div>
            <input type = "button" id="bt" value="salvar" onclick="Salvar()" />
        </div>
   </div>  
   <script>
    function Salvar()
        {
            var name = document.getElementById('txtName').value;
            var idade = document.getElementById('txtIdade').value;
            var email = document.getElementById('txtEmail').value;
            var pais = document.getElementById('SelCountry').value;
            var data = 
            ' as informações abaixo estao corretas? \r Name: ' + name + ' \r\n ' + 
            'Idade: ' +idade + ' \r\n ' + 
            'Email: ' + email + ' \r\n ' + 
            'pais: ' + pais + ' \r\n ';
            confirm(data);
        }
   </script>
</body>
</html>
